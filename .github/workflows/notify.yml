name: Line Notify

on:
  schedule:
    - cron: '0 1 * * *'  # ⏰ 08:00 ไทย
  workflow_dispatch:

jobs:
  run-script:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Install dependencies
        run: npm install

      - name: Run script
        run: node checkAndNotify.js
